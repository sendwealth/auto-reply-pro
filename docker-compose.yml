version: '3.8'

services:
  auto-reply-pro:
    build: .
    container_name: auto-reply-pro
    restart: unless-stopped
    ports:
      - "3002:3002"
      - "3003:3003"
    environment:
      - NODE_ENV=production
      - PORT=3002
      - DASHBOARD_PORT=3003
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - auto-reply-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: auto-reply-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - auto-reply-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

networks:
  auto-reply-network:
    driver: bridge

volumes:
  redis-data:
