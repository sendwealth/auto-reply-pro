version: '3.8'

services:
  auto-reply-pro:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auto-reply-pro
    restart: unless-stopped
    ports:
      - "3002:3002"
      - "3003:3003"
    environment:
      - NODE_ENV=production
      - API_KEY=${API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    volumes:
      - auto-reply-data:/app/data
      - auto-reply-logs:/app/logs
    networks:
      - auto-reply-network
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: auto-reply-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    networks:
      - auto-reply-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  auto-reply-data:
  auto-reply-logs:
  redis-data:

networks:
  auto-reply-network:
    driver: bridge
