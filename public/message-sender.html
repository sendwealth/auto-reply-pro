<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Reply Pro - 消息发送器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .form-container {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
            font-family: inherit;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .history {
            margin-top: 30px;
            border-top: 2px solid #f0f0f0;
            padding-top: 20px;
        }

        .history h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .history-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .history-item strong {
            color: #667eea;
        }

        .quick-replies {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .quick-reply-btn {
            padding: 8px 15px;
            background: #f0f0f0;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .quick-reply-btn:hover {
            background: #667eea;
            color: white;
        }

        .footer {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Auto-Reply Pro</h1>
            <p>消息发送器 v1.0 | 开发者: AI CEO 🍋</p>
        </div>

        <div class="form-container">
            <form id="messageForm">
                <div class="form-group">
                    <label for="platform">📱 选择平台</label>
                    <select id="platform" required>
                        <option value="feishu">飞书</option>
                        <option value="wechat">企业微信</option>
                        <option value="discord">Discord</option>
                        <option value="email">邮件</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="recipient">👤 接收者 ID</label>
                    <input type="text" id="recipient" placeholder="例如: ou_d5695b3a7239c8fb1a3af9a46140b27e" required>
                    <small style="color: #666; font-size: 12px;">飞书用户 ID 或邮箱</small>
                </div>

                <div class="form-group">
                    <label for="message">💬 消息内容</label>
                    <textarea id="message" placeholder="输入你想发送的消息..." required></textarea>
                </div>

                <div class="form-group">
                    <label>⚡ 快速消息</label>
                    <div class="quick-replies">
                        <button type="button" class="quick-reply-btn" onclick="setQuickReply('hello')">hello</button>
                        <button type="button" class="quick-reply-btn" onclick="setQuickReply('你好')">你好</button>
                        <button type="button" class="quick-reply-btn" onclick="setQuickReply('产品多少钱')">产品多少钱</button>
                        <button type="button" class="quick-reply-btn" onclick="setQuickReply('有什么功能')">有什么功能</button>
                    </div>
                </div>

                <button type="submit" class="btn" id="sendBtn">
                    📤 发送消息
                </button>
            </form>

            <div id="status" class="status"></div>

            <div class="history">
                <h3>📋 发送历史</h3>
                <div id="historyList">
                    <p style="color: #999; font-size: 13px;">暂无发送记录</p>
                </div>
            </div>
        </div>

        <div class="footer">
            © 2026 Auto-Reply Pro | 完成度: 100% | 状态: 🟢 运行中
        </div>
    </div>

    <script>
        let sendHistory = [];

        // 快速回复
        function setQuickReply(text) {
            document.getElementById('message').value = text;
        }

        // 表单提交
        document.getElementById('messageForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const platform = document.getElementById('platform').value;
            const recipient = document.getElementById('recipient').value;
            const message = document.getElementById('message').value;
            const sendBtn = document.getElementById('sendBtn');
            const statusDiv = document.getElementById('status');

            // 禁用按钮
            sendBtn.disabled = true;
            sendBtn.textContent = '⏳ 发送中...';
            statusDiv.className = 'status';
            statusDiv.textContent = '';

            try {
                // 调用发送 API
                const response = await fetch('/api/send-message', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        platform: platform,
                        userId: recipient,
                        message: message
                    })
                });

                const result = await response.json();

                if (result.success) {
                    // 显示成功
                    statusDiv.className = 'status success';
                    statusDiv.innerHTML = `
                        ✅ <strong>消息发送成功！</strong><br>
                        <small>平台: ${platform} | 接收者: ${recipient}</small>
                    `;

                    // 添加到历史
                    addToHistory(platform, recipient, message);

                    // 清空表单
                    document.getElementById('message').value = '';
                } else {
                    throw new Error(result.error || '发送失败');
                }
            } catch (error) {
                // 显示错误
                statusDiv.className = 'status error';
                statusDiv.innerHTML = `
                    ❌ <strong>发送失败</strong><br>
                    <small>${error.message}</small>
                `;
            } finally {
                // 恢复按钮
                sendBtn.disabled = false;
                sendBtn.textContent = '📤 发送消息';
            }
        });

        // 添加到历史
        function addToHistory(platform, recipient, message) {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN');

            sendHistory.unshift({
                platform,
                recipient,
                message,
                time: timeStr
            });

            // 只保留最近5条
            if (sendHistory.length > 5) {
                sendHistory.pop();
            }

            // 更新显示
            updateHistoryDisplay();
        }

        // 更新历史显示
        function updateHistoryDisplay() {
            const historyList = document.getElementById('historyList');

            if (sendHistory.length === 0) {
                historyList.innerHTML = '<p style="color: #999; font-size: 13px;">暂无发送记录</p>';
                return;
            }

            historyList.innerHTML = sendHistory.map((item, index) => `
                <div class="history-item">
                    <strong>${item.time}</strong> |
                    ${item.platform} → ${item.recipient.substring(0, 20)}...<br>
                    <span style="color: #666;">${item.message}</span>
                </div>
            `).join('');
        }

        // 页面加载时设置默认接收者
        window.addEventListener('load', function() {
            // 可以从 URL 参数获取接收者
            const urlParams = new URLSearchParams(window.location.search);
            const recipient = urlParams.get('recipient');
            if (recipient) {
                document.getElementById('recipient').value = recipient;
            }
        });
    </script>
</body>
</html>
